name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Triggers the automation whenever you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # 1. Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. Build and Push Docker Image
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/carfinder-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/carfinder-app:${{ github.sha }}

    # 3. Deploy to AWS EC2 via SSH
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull the newly compiled image
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/carfinder-app:latest
          
          # Stop and remove the old container if it exists
          docker stop carfinder-live || true
          docker rm carfinder-live || true
          
          # Spin up the new container on port 80
          docker run -d -p 80:8080 --name carfinder-live --restart always ${{ secrets.DOCKERHUB_USERNAME }}/carfinder-app:latest
          
          # Prune old dangling images to save disk space on EC2 Free Tier
          docker image prune -f
